<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empório Itamogi</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        nav { background: #333; color: #fff; padding: 10px; }
        nav ul { list-style-type: none; margin: 0; padding: 0; }
        nav ul li { display: inline; margin-right: 10px; }
        .hero { background: url('hero.jpg') no-repeat center center; height: 400px; color: white; text-align: center; }
        .kits, .about, .testimonials, .cta, .footer { padding: 20px; }
        .float {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #25D366;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>
    <nav>
        <ul>
            <li><a href="#kits">Kits</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#testimonials">Testimonials</a></li>
            <li><a href="#cta">Contact</a></li>
        </ul>
    </nav>
    <div class="hero">
        <h1>Welcome to Empório Itamogi</h1>
    </div>
    <section id="kits" class="kits">
        <h2>Our Kits</h2>
        <!-- Add kit details here -->
    </section>
    <section id="about" class="about">
        <h2>About Us</h2>
        <p>We are dedicated to providing the best products.</p>
    </section>
    <section id="testimonials" class="testimonials">
        <h2>What Our Customers Say</h2>
        <p>Testimonials will be here.</p>
    </section>
    <div class="cta">
        <h2>Join Us Now!</h2>
    </div>
    <div class="footer">
        <p>&copy; 2026 Empório Itamogi</p>
    </div>
    <div class="float" onclick="openWhatsApp();">
        <img src="whatsapp-icon.png" alt="WhatsApp" width="30" height="30">
    </div>
    <script>
        function openWhatsApp() {
            window.open('https://wa.me/your-number', '_blank');
        }
    </script>
</body>
</html>
